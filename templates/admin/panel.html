{% extends "base.html" %}
{% block title %}管理面板 - CYBER FORUM{% endblock %}
{% block content %}
<h2 style="font-size:1.6rem;font-weight:bold;margin-bottom:1.5rem">
    <span class="neon-pink">⚙️</span> <span class="neon-text">管理面板</span>
</h2>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem">
    <div class="card" style="padding:1.25rem;text-align:center">
        <div style="font-size:2rem;font-weight:bold;color:var(--neon-pink)">{{ stats.users }}</div>
        <div style="color:#888;margin-bottom:0.75rem;font-size:0.875rem">用户</div>
        <a href="/admin/users" class="btn-neon" style="font-size:0.8rem;padding:0.3rem 0.8rem">管理</a>
    </div>
    <div class="card" style="padding:1.25rem;text-align:center">
        <div style="font-size:2rem;font-weight:bold;color:var(--neon-blue)">{{ stats.posts }}</div>
        <div style="color:#888;margin-bottom:0.75rem;font-size:0.875rem">帖子</div>
        <a href="/admin/posts" class="btn-neon" style="font-size:0.8rem;padding:0.3rem 0.8rem">管理</a>
    </div>
    <div class="card" style="padding:1.25rem;text-align:center">
        <div style="font-size:2rem;font-weight:bold;color:var(--neon-yellow)">{{ stats.comments }}</div>
        <div style="color:#888;font-size:0.875rem">评论</div>
    </div>
</div>

<div class="card" style="padding:1.5rem">
    <h3 style="font-size:1.1rem;font-weight:bold;margin-bottom:1rem">快速操作</h3>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem">
        <a href="/post/new" class="btn-neon" style="text-align:center">+ 发布新帖</a>
        <a href="/" style="padding:0.5rem;text-align:center;border:1px solid var(--neon-blue);border-radius:6px;display:inline-block">返回首页</a>
    </div>
</div>

<style>
@media (max-width:600px){
    div[style*="grid-template-columns:repeat(3,1fr)"]{grid-template-columns:repeat(2,1fr)!important}
}
@media (max-width:400px){
    div[style*="grid-template-columns:repeat(3,1fr)"]{grid-template-columns:1fr!important}
    div[style*="grid-template-columns:repeat(2,1fr)"]{grid-template-columns:1fr!important}
    h2{font-size:1.3rem!important}
}
</style>
{% endblock %}
