{% extends "base.html" %}
{% block title %}帖子管理 - CYBER FORUM{% endblock %}
{% block content %}
<h2 style="font-size:1.5rem;font-weight:bold;margin-bottom:1.5rem"><span class="neon-pink">📝</span> 帖子管理</h2>
<div style="display:flex;flex-direction:column;gap:1rem">
{% for post in posts %}
    <div class="card" style="padding:1rem;display:flex;align-items:center;justify-content:space-between">
        <div>
            <h3 style="font-weight:bold">{{ post.title }}</h3>
            <p style="font-size:0.875rem;color:#888">{{ post.author.username }} · {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
        </div>
        <form action="/post/{{ post.id }}/pin" method="POST">
            <button type="submit" style="padding:0.3rem 0.8rem;font-size:0.75rem;border-radius:4px;cursor:pointer;{% if post.pinned %}background:var(--neon-yellow);color:black{% else %}background:#374151{% endif %}">
                {{ "📌 取消置顶" if post.pinned else "📌 置顶" }}
            </button>
        </form>
    </div>
{% endfor %}
</div>
{% endblock %}
